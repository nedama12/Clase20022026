<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Linear Regression Grades</title>

<style>

/* BASE */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
    color: #e2e8f0;
}

/* FONDO */
body::before {
    content: "";
    position: fixed;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(56,189,248,0.25), transparent);
    top: -120px;
    left: -120px;
    filter: blur(100px);
}

body::after {
    content: "";
    position: fixed;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(16,185,129,0.25), transparent);
    bottom: -120px;
    right: -120px;
    filter: blur(100px);
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.navbar h2 {
    margin: 0;
    color: #38bdf8;
}

.nav-links a {
    text-decoration: none;
    margin-left: 20px;
    color: #cbd5f5;
    font-weight: 500;
    transition: 0.3s;
}

.nav-links a:hover {
    color: #38bdf8;
}

/* CONTENEDOR */
.container {
    max-width: 450px;
    margin: 120px auto;
    padding: 30px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 16px;
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.08);
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* TITULO */
h1 {
    font-size: 22px;
    margin-bottom: 20px;
    color: #e2e8f0;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    margin-bottom: 20px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: white;
    outline: none;
}

/* BOTON */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #38bdf8, #2563eb);
    border: none;
    color: white;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 15px rgba(56,189,248,0.5);
}

/* RESULTADO */
.result {
    margin-top: 20px;
    padding: 15px;
    background: rgba(16,185,129,0.15);
    border-left: 4px solid #22c55e;
    border-radius: 8px;
}

/* BACK */
.back {
    display: inline-block;
    margin-top: 25px;
    text-decoration: none;
    color: #94a3b8;
    transition: 0.3s;
}

.back:hover {
    color: #38bdf8;
}

</style>
</head>

<body>

<nav class="navbar">
    <h2>ML Project</h2>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/use-cases">Use Cases</a>
        <a href="/LinearRegression">Regression</a>
    </div>
</nav>

<div class="container">

    <div class="card">

        <h1>Predict Grade Based on Study Hours</h1>

        <form method="post">
            <input type="number" name="hours" placeholder="Enter study hours" required>
            <button type="submit">Predict</button>
        </form>

        {% if result is not none %}
        <div class="result">
            Estimated Grade: <strong>{{ result }}</strong>
        </div>
        {% endif %}

    </div>

    <a href="/LinearRegression" class="back">⬅ Back to Regression</a>

</div>

</body>
</html>
