<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logistic Regression Menu</title>

<style>

/* BASE */
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b, #020617);
    color: #e2e8f0;
}

/* EFECTO FONDO */
body::before {
    content: "";
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(56,189,248,0.25), transparent);
    top: -150px;
    left: -150px;
    filter: blur(120px);
}

body::after {
    content: "";
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(139,92,246,0.25), transparent);
    bottom: -150px;
    right: -150px;
    filter: blur(120px);
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.navbar h2 {
    margin: 0;
    color: #38bdf8;
}

.nav-links a {
    text-decoration: none;
    margin-left: 20px;
    color: #cbd5f5;
    font-weight: 500;
    transition: 0.3s;
}

.nav-links a:hover {
    color: #38bdf8;
}

/* CONTENEDOR */
.container {
    text-align: center;
    margin-top: 120px;
    padding: 20px;
}

/* TITULO */
h1 {
    font-size: 48px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, #38bdf8, #8b5cf6);
    -webkit-background-clip: text;
    color: transparent;
}

.subtitle {
    color: #94a3b8;
    margin-bottom: 60px;
    font-size: 18px;
}

/* BOTONES */
.main-buttons {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
}

/* TARJETAS */
.main-btn {
    width: 260px;
    height: 140px;
    border-radius: 18px;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);

    border: 1px solid rgba(255,255,255,0.08);

    box-shadow: 0 10px 25px rgba(0,0,0,0.3);

    transition: 0.35s;
}

/* HOVER PRO */
.main-btn:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: 0 0 25px rgba(139,92,246,0.4);
}

/* TEXTO */
.main-btn h3 {
    margin: 0;
    font-size: 20px;
    color: #e2e8f0;
}

.main-btn p {
    margin-top: 8px;
    font-size: 14px;
    color: #94a3b8;
}

/* COLORES */
.concepts {
    border-left: 4px solid #38bdf8;
}

.application {
    border-left: 4px solid #22c55e;
}

/* BACK */
.back {
    margin-top: 60px;
    display: inline-block;
    text-decoration: none;
    color: #94a3b8;
    font-weight: 500;
    transition: 0.3s;
}

.back:hover {
    color: #38bdf8;
}

</style>
</head>

<body>

<nav class="navbar">
    <h2>ML Project</h2>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/use-cases">Use Cases</a>
        <a href="/LinearRegression">Regression</a>
        <a href="/LogisticRegression">Logistic</a>
    </div>
</nav>

<div class="container">

    <h1>Logistic Regression Module</h1>
    <p class="subtitle">Explore concepts and application</p>

    <div class="main-buttons">

        <!-- CONCEPTS -->
        <a href="/LogisticRegressionConcepts" class="main-btn concepts">
            <h3>Concepts</h3>
            <p>Understand the theory</p>
        </a>

        <!-- APPLICATION -->
        <a href="/LogisticRegressionApplication" class="main-btn application">
            <h3>Application</h3>
            <p>Use the classification model</p>
        </a>

    </div>

    <!-- BACK -->
    <a href="/" class="back">← Back to Home</a>

</div>

</body>
</html>
